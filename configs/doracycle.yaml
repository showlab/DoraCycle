# DoraCycle config (style / unpaired adaptation)
# Usage: accelerate launch --config_file accelerate_configs/8_gpu_deepspeed_zero2.yaml --main_process_port=8888 training/train_doracycle.py config=configs/doracycle.yaml

wandb:
  entity: null
  resume: 'auto'

experiment:
  project: "training"
  name: "DoraCycle_demo"
  output_dir: "DoraCycle_demo"
  # Path to your unpaired image+text data (see README for CusDataset format)
  cus_data_path: "<YOUR_CUS_DATA_PATH>"
  characters_names: ["SKS_STYLE"]
  max_train_examples_t2i: 8192
  max_train_examples_mmu: 8192
  save_every: 500
  eval_every: 2500
  generate_every: 100
  log_every: 10
  log_grad_norm_every: 500
  resume_from_checkpoint: 'latest'
  checkpoints_total_limit: 5

model:
  vq_model:
    type: "magvitv2"
    vq_model_name: "showlab/magvitv2"
  showo:
    load_from_showo: False
    pretrained_model_path: "showlab/show-o-512x512"
    w_clip_vit: False
    vocab_size: 58498
    llm_vocab_size: 50295
    llm_model_path: "microsoft/phi-1_5"
    codebook_size: 8192
    num_vq_tokens: 1024
    num_new_special_tokens: 10
  gradient_checkpointing: True

dataset:
  gen_type: "t2i"
  und_type: "captioning"
  combined_loader_mode: "max_size_cycle"
  params:
    train_lm_shards_path_or_url: "<YOUR_LM_PARQUET_OR_REFINEDWEB_PATH>"
    num_workers: 32
    resolution: 512
    pin_memory: True
    persistent_workers: True
    validation_prompts_file: "validation_prompts/cus_doraemon.txt"
    shuffle_buffer_size: 2
  preprocessing:
    max_seq_length: 256
    resolution: 512
    center_crop: False
    random_flip: False

optimizer:
  name: adamw
  params:
    learning_rate: 0.0001
    scale_lr: False
    beta1: 0.9
    beta2: 0.999
    weight_decay: 0.01
    epsilon: 1e-8

lr_scheduler:
  scheduler: "cosine"
  params:
    learning_rate: ${optimizer.params.learning_rate}
    warmup_steps: 0

training:
  gradient_accumulation_steps: 1
  batch_size_t2i: 2
  batch_size_lm: 1
  batch_size_mmu: 2
  mixed_precision: "bf16"
  enable_tf32: True
  seed: 10086
  max_train_steps: 200000000
  overfit_one_batch: False
  cond_dropout_prob: 0.1
  min_masking_rate: 0.0
  label_smoothing: 0.0
  max_grad_norm: null
  guidance_scale: 5.0
  generation_timesteps: 50
  t2i_coeff: 1.0
  lm_coeff: 0.1
  mmu_coeff: 1.0
  t_cycle_coeff: 0.1  # beta: T-cycle loss weight (L = L_IC + beta*L_TC)
  ema_decay: 0.999  # EMA alpha for pseudo-data generation
